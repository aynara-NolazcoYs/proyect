version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: edufuturo-db
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: EduFuturo@2024
      MSSQL_PID: Express
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: [ "CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "EduFuturo@2024", "-Q", "SELECT 1" ]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - edufuturo-network

volumes:
  sqlserver_data:

networks:
  edufuturo-network:
    driver: bridge
