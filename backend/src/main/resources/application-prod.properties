spring.application.name=edufuturo-backend

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# SQL Server Database Configuration (Production)
spring.datasource.url=jdbc:sqlserver://sqlserver:1433;databaseName=EduFuturoDB;encrypt=true;trustServerCertificate=true;loginTimeout=30;
spring.datasource.username=sa
spring.datasource.password=${DB_PASSWORD:EduFuturo@2024}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.SQLServer2012Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServer2012Dialect

# Logging (Production - minimal)
logging.level.root=WARN
logging.level.com.edufuturo=INFO

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# CORS Configuration
spring.web.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost:3000}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
